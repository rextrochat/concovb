<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Netes</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#1e3a8a,#2563eb);
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}



.panel{
width:550px;
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);
text-align:center;
}



h1{
color:#93c5fd;
text-shadow:0 0 15px #60a5fa;
}

input{
width:90%;
padding:10px;
margin:6px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.2);
color:white;
}

button{
padding:10px 20px;
margin:6px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
transform:scale(1.05);
}

.menu button{
width:200px;
}

.box{
margin-top:15px;
padding:10px;
border:1px solid rgba(255,255,255,0.2);
border-radius:10px;
}

.status{
color:#bfdbfe;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="panel">

<h1>Netes</h1>



<div id="login">

<input id="user" placeholder="Kullanıcı adı">
<input id="pass" type="password" placeholder="Şifre">

<br>

<button onclick="login()">Giriş</button>
<button onclick="register()">Kayıt</button>

</div>



<div id="menu" style="display:none">

<h2 id="welcome"></h2>

<div class="menu">

<button onclick="openBots()">Minecraft Bot Gönderme</button>

<button onclick="openIP()">IP Analiz</button>

</div>

</div>



<div id="bots" style="display:none">

<h2>Bot Panel</h2>

<div class="status" id="serverStatus"></div>

<input id="serverIP" placeholder="Sunucu IP">

<button onclick="checkServer()">Server Status</button>

<div class="box">

<h3>Bot Panel 1</h3>

<input id="botCount1" placeholder="Bot sayısı">

<button onclick="sendBots1()">Bot Gönder</button>

<div id="botResult1"></div>

</div>

<div class="box">

<h3>Bot Panel 2</h3>

<input id="botCount2" placeholder="Bot sayısı">

<button onclick="sendBots2()">Bot Gönder</button>

<div id="botResult2"></div>

</div>

<button onclick="back()">Geri</button>

</div>



<div id="ipPage" style="display:none">

<h2>IP Analiz</h2>

<input id="ipInput" placeholder="IP adresi">

<button onclick="ipLookup()">Sorgula</button>

<div id="ipInfo"></div>

<button onclick="back()">Geri</button>

</div>

</div>

<script>



function register(){

let u=user.value
let p=pass.value

let db=JSON.parse(localStorage.getItem("users"))||[]

db.push({u,p})

localStorage.setItem("users",JSON.stringify(db))

alert("Kayıt tamam")

}

function login(){

let u=user.value
let p=pass.value

let db=JSON.parse(localStorage.getItem("users"))||[]

let found=db.find(x=>x.u==u && x.p==p)

if(found){

login.style.display="none"
menu.style.display="block"

welcome.innerText="Merhaba "+u

}else{

alert("Hatalı giriş")

}

}



function openBots(){

menu.style.display="none"
bots.style.display="block"

}

function openIP(){

menu.style.display="none"
ipPage.style.display="block"

}

function back(){

bots.style.display="none"
ipPage.style.display="none"
menu.style.display="block"

}



async function checkServer(){

let ip=serverIP.value

let res=await fetch("https://api.mcsrvstat.us/2/"+ip)

let data=await res.json()

serverStatus.innerHTML=

"Online: "+data.online+
"<br>Oyuncular: "+(data.players?data.players.online:0)

}



function sendBots1(){

let count=botCount1.value
let i=0

let interval=setInterval(()=>{

i++

botResult1.innerText="Gönderilen bot "+i+"/"+count

if(i>=count){

clearInterval(interval)

}

},200)

}

function sendBots2(){

let count=botCount2.value
let i=0

let interval=setInterval(()=>{

i++

botResult2.innerText="Gönderilen bot "+i+"/"+count

if(i>=count){

clearInterval(interval)

}

},200)

}



async function ipLookup(){

let ip=ipInput.value

let res=await fetch("https://ipapi.co/"+ip+"/json/")

let data=await res.json()

ipInfo.innerHTML=

`
IP: ${data.ip}<br>
Ülke: ${data.country_name}<br>
Şehir: ${data.city}<br>
Bölge: ${data.region}<br>
Posta kodu: ${data.postal}<br>
Saat dilimi: ${data.timezone}<br>
ISP: ${data.org}<br>
Koordinat: ${data.latitude}, ${data.longitude}
`

}

</script>

</body>
</html>
