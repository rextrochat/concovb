<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Modern Kontrol Paneli</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
input:focus {
  @apply ring-4 ring-blue-400 shadow-lg transition-all duration-300;
}
button {
  transition: transform 0.2s ease, background-color 0.2s ease;
}
button:hover {
  transform: scale(1.05);
  background-color: #3b82f6; 
}
</style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-blue-400 to-white">

<div class="bg-black/20 rounded-xl p-8 w-96 text-white text-center">
  <h1 class="text-2xl mb-6 font-semibold">Kontrol Paneli</h1>
  <div class="flex flex-col space-y-3 mb-4">
    <button onclick="showLag()" class="bg-blue-600 rounded-md py-2">IP Lag Kontrol Et</button>
    <button onclick="showServer()" class="bg-blue-600 rounded-md py-2">Sunucu Kontrol Et</button>
    <button onclick="showPasswordCheck()" class="bg-blue-600 rounded-md py-2">Şifre Güç Kontrolü</button>
  </div>
  <div id="inputSection" class="flex flex-col items-center"></div>
  <div id="panelResult" class="mt-4 font-bold text-lg"></div>
</div>


<div class="mt-6 text-center text-white font-bold tracking-widest">
  REXTRO TARAFINDAN YAPILIP GELİŞTİRİLMİŞTİR
</div>

<script>
function clearPanel(){
  document.getElementById('inputSection').innerHTML='';
  document.getElementById('panelResult').innerHTML='';
}

function showLag(){
  clearPanel();
  document.getElementById('inputSection').innerHTML=`
    <input type="text" id="url" placeholder="URL veya IP girin" class="mb-2 p-2 rounded-md bg-blue-500 text-white w-full">
    <button onclick="testLag()" class="bg-blue-600 rounded-md py-2 w-full">Test Et</button>`;
}

function showServer(){
  clearPanel();
  document.getElementById('inputSection').innerHTML=`
    <input type="text" id="url" placeholder="Sunucu URL girin" class="mb-2 p-2 rounded-md bg-blue-500 text-white w-full">
    <button onclick="testServer()" class="bg-blue-600 rounded-md py-2 w-full">Test Et</button>`;
}

function showPasswordCheck(){
  clearPanel();
  document.getElementById('inputSection').innerHTML=`
    <input type="password" id="pwCheck" placeholder="Şifre girin" class="mb-2 p-2 rounded-md bg-blue-500 text-white w-full">
    <button onclick="checkPassword()" class="bg-blue-600 rounded-md py-2 w-full">Kontrol Et</button>`;
}

async function testLag(){
  const url=document.getElementById('url').value;
  const resultDiv=document.getElementById('panelResult');
  if(!url){resultDiv.innerText='Lütfen URL girin!'; return;}
  const start=performance.now();
  try{
    await fetch(url,{method:'HEAD',mode:'no-cors'});
    const end=performance.now();
    const latency=Math.round(end-start);
    let color='green', status='Hızlı ';
    if(latency>500){color='red'; status='Yavaş ';}
    else if(latency>200){color='yellow'; status='Orta ';}
    resultDiv.innerHTML=`Gecikme: <span style="color:${color}">${latency} ms</span> — ${status}`;
  } catch(err){
    resultDiv.innerHTML='<span style="color:red">Sunucuya ulaşılamıyor!</span>';
  }
}

async function testServer(){
  const url=document.getElementById('url').value;
  const resultDiv=document.getElementById('panelResult');
  if(!url){resultDiv.innerText='Lütfen URL girin!'; return;}
  const start=performance.now();
  try{
    await fetch(url,{method:'GET',mode:'no-cors'});
    const end=performance.now();
    const latency=Math.round(end-start);
    let color='green', status='Hızlı ';
    if(latency>500){color='red'; status='Yavaş ';}
    else if(latency>200){color='yellow'; status='Orta ';}
    resultDiv.innerHTML=`Sunucu Yanıt Süresi: <span style="color:${color}">${latency} ms</span> — ${status}`;
  } catch(err){
    resultDiv.innerHTML='<span style="color:red">Sunucuya ulaşılamıyor!</span>';
  }
}

function checkPassword(){
  const pw=document.getElementById('pwCheck').value;
  const resultDiv=document.getElementById('panelResult');
  if(!pw){resultDiv.innerText='Şifre girin!'; return;}
  let strength='Zayıf ';
  if(pw.length>=8 && /[A-Z]/.test(pw) && /[0-9]/.test(pw) && /[\W]/.test(pw)) strength='Güçlü ';
  else if(pw.length>=6 && /[0-9]/.test(pw)) strength='Orta ';
  resultDiv.innerText=`Şifre Güç: ${strength}`;
}
</script>

</body>
</html>
