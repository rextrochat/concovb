<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Netes</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#1e3a8a,#2563eb);
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.panel{
width:550px;
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);
text-align:center;
}

h1{
color:#93c5fd;
text-shadow:0 0 15px #60a5fa;
}

.tabs button{
width:120px;
}

input{
width:90%;
padding:10px;
margin:6px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.2);
color:white;
}

button{
padding:10px 20px;
margin:6px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
transform:scale(1.05);
}

.menu button{
width:200px;
}

.box{
margin-top:15px;
padding:10px;
border:1px solid rgba(255,255,255,0.2);
border-radius:10px;
}

.status{
color:#bfdbfe;
margin-bottom:10px;
}

.message{
position:fixed;
top:-80px;
left:50%;
transform:translateX(-50%);
background:#2563eb;
padding:15px 30px;
border-radius:10px;
font-weight:bold;
transition:0.6s;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.message.show{
top:20px;
}

</style>
</head>

<body>

<div class="message" id="msg"></div>

<div class="panel">

<h1>Netes</h1>

<div class="tabs">
<button onclick="showLogin()">Giriş</button>
<button onclick="showRegister()">Kayıt</button>
</div>

<div id="loginBox">

<h2>Giriş</h2>

<input id="loginUser" placeholder="Kullanıcı adı">
<input id="loginPass" type="password" placeholder="Şifre">

<br>

<button onclick="login()">Giriş Yap</button>

</div>

<div id="registerBox" style="display:none">

<h2>Kayıt</h2>

<input id="regUser" placeholder="Kullanıcı adı">
<input id="regPass" type="password" placeholder="Şifre">

<br>

<button onclick="register()">Kayıt Ol</button>

</div>

<div id="menu" style="display:none">

<h2 id="welcome"></h2>

<div class="menu">

<button onclick="openBots()">Minecraft Bot Gönderme</button>

<button onclick="openIP()">IP Analiz</button>

<button onclick="logout()">Çıkış</button>

</div>

</div>

<div id="bots" style="display:none">

<h2>Bot Panel</h2>

<div class="status" id="serverStatus"></div>

<input id="serverIP" placeholder="Sunucu IP">

<button onclick="checkServer()">Server Status</button>

<div class="box">

<h3>Bot Panel 1</h3>

<input id="botCount1" placeholder="Bot sayısı">

<button onclick="sendBots1()">Bot Gönder</button>

<div id="botResult1"></div>

</div>

<div class="box">

<h3>Bot Panel 2</h3>

<input id="botCount2" placeholder="Bot sayısı">

<button onclick="sendBots2()">Bot Gönder</button>

<div id="botResult2"></div>

</div>

<button onclick="back()">Geri</button>

</div>

<div id="ipPage" style="display:none">

<h2>IP Analiz</h2>

<input id="ipInput" placeholder="IP adresi">

<button onclick="ipLookup()">Sorgula</button>

<div id="ipInfo"></div>

<button onclick="back()">Geri</button>

</div>

</div>

<script>

function siteMsg(text){
msg.innerText=text
msg.classList.add("show")
setTimeout(()=>{msg.classList.remove("show")},3000)
}

function showLogin(){
loginBox.style.display="block"
registerBox.style.display="none"
}

function showRegister(){
loginBox.style.display="none"
registerBox.style.display="block"
}

function register(){

let u=regUser.value
let p=regPass.value

let db=JSON.parse(localStorage.getItem("users"))||[]

if(db.find(x=>x.u==u)){
siteMsg("Bu kullanıcı zaten var")
return
}

db.push({u,p})

localStorage.setItem("users",JSON.stringify(db))

siteMsg("Kayıt başarılı")

showLogin()

}

function login(){

let u=loginUser.value
let p=loginPass.value

let db=JSON.parse(localStorage.getItem("users"))||[]

let found=db.find(x=>x.u==u && x.p==p)

if(found){

localStorage.setItem("activeUser",u)

loginBox.style.display="none"
registerBox.style.display="none"
menu.style.display="block"

welcome.innerText="Merhaba "+u

siteMsg("Giriş başarılı")

}else{

siteMsg("Hatalı giriş")

}

}

function logout(){

localStorage.removeItem("activeUser")

location.reload()

}

window.onload=function(){

let u=localStorage.getItem("activeUser")

if(u){

loginBox.style.display="none"
registerBox.style.display="none"
menu.style.display="block"

welcome.innerText="Merhaba "+u

}

}

function openBots(){
menu.style.display="none"
bots.style.display="block"
}

function openIP(){
menu.style.display="none"
ipPage.style.display="block"
}

function back(){
bots.style.display="none"
ipPage.style.display="none"
menu.style.display="block"
}

async function checkServer(){

let ip=serverIP.value

let res=await fetch("https://api.mcsrvstat.us/2/"+ip)
let data=await res.json()

serverStatus.innerHTML=
"Online: "+data.online+
"<br>Oyuncular: "+(data.players?data.players.online:0)

}

function sendBots1(){

let count=botCount1.value
let i=0

let interval=setInterval(()=>{

i++

botResult1.innerText="Gönderilen bot "+i+"/"+count

if(i>=count){

clearInterval(interval)

siteMsg("Bot gönderme tamamlandı")

}

},200)

}

function sendBots2(){

let count=botCount2.value
let i=0

let interval=setInterval(()=>{

i++

botResult2.innerText="Gönderilen bot "+i+"/"+count

if(i>=count){

clearInterval(interval)

siteMsg("Bot gönderme tamamlandı")

}

},200)

}

async function ipLookup(){

let ip=ipInput.value

let res=await fetch("https://ipapi.co/"+ip+"/json/")
let data=await res.json()

ipInfo.innerHTML=

`
IP: ${data.ip}<br>
Ülke: ${data.country_name}<br>
Şehir: ${data.city}<br>
Bölge: ${data.region}<br>
Posta kodu: ${data.postal}<br>
Saat dilimi: ${data.timezone}<br>
ISP: ${data.org}<br>
Koordinat: ${data.latitude}, ${data.longitude}
`

}

</script>

</body>
</html>
