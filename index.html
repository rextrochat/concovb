<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlacaSunucum</title>

<style>
:root {
  --bg-dark: #1e3c72;
  --primary: #4a90e2;
  --accent: #2a5298;
}
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: var(--bg-dark);
  color:#fff;
}


header{
  text-align:center;
  padding:60px 20px;
  background: linear-gradient(90deg,var(--primary),var(--accent));
  animation:fadeIn 1s ease;
}


.menu{
  position:fixed;
  top:15px;
  right:20px;
  font-size:28px;
  cursor:pointer;
  transition: transform 0.3s;
}
.menu:hover{
  transform:scale(1.2);
}
.dropdown{
  position:fixed;
  top:50px;
  right:20px;
  background:#111;
  border-radius:10px;
  display:none;
  overflow:hidden;
  animation:fadeIn 0.3s;
}
.dropdown div{
  padding:10px 20px;
  cursor:pointer;
  transition: background 0.2s;
}
.dropdown div:hover{
  background:#333;
}


main{
  max-width:1000px;
  margin:40px auto;
  padding:20px;
}
section{
  margin-bottom:20px;
  padding:20px;
  background: rgba(255,255,255,0.05);
  border-radius:12px;
  transition: all 0.3s;
  animation:fadeUp 0.8s ease;
}
section:hover{
  transform:translateY(-5px) scale(1.02);
}

button{
  background: linear-gradient(45deg,var(--primary),var(--accent));
  color:#fff;
  border:none;
  padding:12px 30px;
  border-radius:25px;
  cursor:pointer;
  transition: all 0.3s;
}
button:hover{
  transform:scale(1.1);
}


#authBox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.authPanel{
  background:#111;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:300px;
  animation:zoomIn 0.5s ease;
}
.authPanel input{
  width:90%;
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}
#switchText{
  margin-top:10px;
  text-decoration:underline;
  cursor:pointer;
  color:#4a90e2;
}


@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
@keyframes zoomIn{
  from{transform:scale(0.7); opacity:0;}
  to{transform:scale(1); opacity:1;}
}
</style>
</head>

<body>


<div class="menu" onclick="toggleMenu()">⋮</div>
<div class="dropdown" id="menuBox">
  <div onclick="goDiscord()">Discord</div>
  <div onclick="goSite()">Web Site</div>
</div>

<header>
<h1>AlacaSunucum 🗄️</h1>
<p>DDOS korumalı, güvenli ve hızlı</p>
</header>

<main>

<section>
<h2>⚡ Hızlı ve Güvenlik</h2>
<p>Sunucularımız en yüksek performanslıdır.</p>
</section>

<section>
<h2>🛡️ DDOS Koruması</h2>
<p>Güçlü altyapı ile saldırılara karşı koruma.</p>
</section>

<section>
<h2>💾 Kolay Yönetim</h2>
<p>Panel üzerinden hızlı kontrol ve yönetim.</p>
</section>

<section style="text-align:center;">
<button onclick="goDiscord()">Hemen Başla</button>
</section>

</main>


<div id="authBox">
  <div class="authPanel">
    <h2 id="authTitle">Giriş Yap</h2>

    <input id="user" placeholder="Kullanıcı adı">
    <input id="pass" type="password" placeholder="Şifre">

    <button onclick="auth()">Giriş Yap</button>

    <div id="switchText" onclick="switchMode()">Kayıt Ol</div>
  </div>
</div>

<script>
let isLogin=true;

function switchMode(){
  isLogin=!isLogin;
  document.getElementById("authTitle").innerText = isLogin ? "Giriş Yap" : "Kayıt Ol";
  document.querySelector("#authBox button").innerText = isLogin ? "Giriş Yap" : "Kayıt Ol";
  document.getElementById("switchText").innerText = isLogin ? "Kayıt Ol" : "Giriş Yap";
}

function auth(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(!u||!p) return alert("Boş bırakma!");

  if(isLogin){
    if(localStorage.getItem(u)==p){
      alert("Başarıyla giriş yapıldı!");
      document.getElementById("authBox").style.display="none";
    } else alert("Hatalı giriş!");
  } else {
    if(localStorage.getItem(u)) return alert("Bu kullanıcı var!");
    localStorage.setItem(u,p);
    alert("Kayıt olundu!");
    switchMode();
  }
}

function toggleMenu(){
  let m=document.getElementById("menuBox");
  m.style.display = m.style.display=="block" ? "none" : "block";
}

function goDiscord(){
  window.location.href="https://discord.gg/alacahost";
}
function goSite(){
  window.location.href="https://dogansunucum.com/";
}
</script>

</body>
</html>

</body>
</html>
